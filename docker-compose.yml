services:
  postgres:
    image: postgres:16-alpine
    container_name: aiacademy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiacademy
      POSTGRES_PASSWORD: aiacademy
      POSTGRES_DB: aiacademy
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiacademy']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiacademy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aiacademy-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://aiacademy:aiacademy@postgres:5432/aiacademy?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-please}
      CORS_ORIGINS: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-4o-mini}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: aiacademy-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  pgdata:
